<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Language Translator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Load Three.js for 3D Space Background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-deep: #080c14;
            --bg-surface: #0b1020;
            --glass-bg: rgba(10, 20, 38, 0.45);
            --glass-border: rgba(0, 224, 200, 0.18);
            --glass-border-hover: rgba(0, 224, 200, 0.38);
            --accent: #00ffd9;
            --accent-dim: #00ccb4;
            --accent-glow: rgba(0, 255, 217, 0.4);
            --accent-glow-soft: rgba(0, 255, 217, 0.12);
            --text-primary: #f0f4fa;
            --text-secondary: #a0aec4;
            --text-muted: #6b7a96;
            --danger: #ff4d6a;
            --success: #00ffd9;
        }

        html {
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ─── Ambient Background Glow ─── */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 1200px;
            height: 800px;
            background: radial-gradient(ellipse at center, rgba(0, 255, 217, 0.18) 0%, rgba(0, 224, 200, 0.08) 35%, rgba(0, 180, 164, 0.03) 55%, transparent 75%);
            pointer-events: none;
            z-index: 0;
            animation: ambientPulse 6s ease-in-out infinite alternate;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 1400px;
            height: 700px;
            background: radial-gradient(ellipse at center, rgba(0, 255, 217, 0.14) 0%, rgba(0, 200, 180, 0.06) 35%, transparent 65%);
            pointer-events: none;
            z-index: 0;
            animation: ambientPulse 8s ease-in-out 2s infinite alternate;
        }

        @keyframes ambientPulse {
            0% {
                opacity: 0.7;
                transform: translateX(-50%) scale(1);
            }

            100% {
                opacity: 1;
                transform: translateX(-50%) scale(1.12);
            }
        }

        /* ─── Floating Particles ─── */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            box-shadow: 0 0 6px 2px var(--accent-glow), 0 0 14px 4px rgba(0, 255, 217, 0.15);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0.3);
            }

            8% {
                opacity: 0.9;
            }

            30% {
                opacity: 1;
                transform: translateY(65vh) scale(1.2);
            }

            60% {
                opacity: 0.85;
            }

            85% {
                opacity: 0.5;
            }

            100% {
                opacity: 0;
                transform: translateY(-10vh) scale(0.6);
            }
        }

        /* ─── Main Container ─── */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 960px;
            padding: 2rem;
        }

        /* ─── Header ─── */
        .header {
            text-align: center;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent) 0%, #00ffea 50%, var(--accent-dim) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.4rem;
        }

        .header p {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ─── Engine Status Badge ─── */
        .engine-status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.85rem;
            background: rgba(0, 255, 217, 0.05);
            border: 1px solid rgba(0, 255, 217, 0.15);
            border-radius: 30px;
            margin-bottom: 0.8rem;
            box-shadow: 0 0 15px rgba(0, 255, 217, 0.03);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--accent);
            animation: statusPulse 1.5s ease-in-out infinite alternate;
        }

        @keyframes statusPulse {
            0% { opacity: 0.4; }
            100% { opacity: 1; box-shadow: 0 0 12px var(--accent); }
        }

        .status-text {
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--accent);
        }

        /* ─── Glass Divider ─── */
        .header-divider {
            width: 100%;
            max-width: 480px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 217, 0.2), transparent);
            margin: 0.5rem 0 2rem 0;
            opacity: 0;
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }

        /* ─── Language Toolbar ─── */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .lang-select {
            position: relative;
        }

        .lang-select select {
            appearance: none;
            -webkit-appearance: none;
            background: rgba(10, 20, 38, 0.65);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(0, 255, 217, 0.15);
            color: var(--text-primary);
            padding: 0.75rem 2.8rem 0.75rem 1.25rem;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            min-width: 180px;
            letter-spacing: 0.02em;
        }

        .lang-select select:hover {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 255, 217, 0.1), inset 0 0 10px rgba(0, 255, 217, 0.05);
            color: #ffffff;
        }

        .lang-select select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 255, 217, 0.2), inset 0 0 10px rgba(0, 255, 217, 0.05);
        }

        .lang-select select option {
            background: #0d1322;
            color: var(--text-primary);
            padding: 8px;
        }

        .lang-select::after {
            content: '▾';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 0.85rem;
            pointer-events: none;
        }

        /* ─── Swap Button ─── */
        .swap-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(10, 20, 38, 0.65);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(0, 255, 217, 0.2);
            color: var(--accent);
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0, 255, 217, 0.03);
        }

        .swap-btn:hover {
            border-color: var(--accent);
            color: #ffffff;
            box-shadow: 0 0 30px var(--accent-glow), 0 4px 20px rgba(0, 255, 217, 0.15), inset 0 0 15px rgba(0, 255, 217, 0.1);
            transform: rotate(180deg) scale(1.05);
        }

        /* ─── Workspace Grid ─── */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 768px) {
            .workspace {
                grid-template-columns: 1fr;
            }

            .box.source-box {
                animation-name: slideInFromTop;
            }

            .box.target-box {
                animation-name: slideInFromBottom;
            }
        }

        /* ─── Glass Panels ─── */
        .box {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(1.6);
            -webkit-backdrop-filter: blur(40px) saturate(1.6);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
            will-change: transform, opacity;
            box-shadow: 0 4px 30px rgba(0, 255, 217, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }

        /* Ambient inner glow */
        .box::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(0, 255, 217, 0.1) 0%, rgba(0, 200, 180, 0.03) 40%, transparent 60%, rgba(0, 255, 217, 0.05) 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* Edge highlight on top */
        .box::after {
            content: '';
            position: absolute;
            top: 0;
            left: 15%;
            right: 15%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 217, 0.45), transparent);
            pointer-events: none;
            z-index: 1;
        }

        .box:hover {
            border-color: var(--glass-border-hover);
            box-shadow: 0 8px 50px rgba(0, 255, 217, 0.1), 0 0 1px rgba(0, 255, 217, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        /* ─── Slide-in Animations ─── */
        .box.source-box {
            opacity: 0;
            animation: slideInFromLeft 2.2s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
        }

        .box.target-box {
            opacity: 0;
            animation: slideInFromRight 2.2s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
        }

        @keyframes slideInFromLeft {
            0% {
                opacity: 0;
                transform: translateX(-200px) scale(0.88);
                filter: blur(12px);
            }

            40% {
                opacity: 0.5;
                filter: blur(4px);
            }

            70% {
                opacity: 0.9;
                transform: translateX(10px) scale(1.01);
                filter: blur(0);
            }

            85% {
                transform: translateX(-4px) scale(1);
            }

            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes slideInFromRight {
            0% {
                opacity: 0;
                transform: translateX(200px) scale(0.88);
                filter: blur(12px);
            }

            40% {
                opacity: 0.5;
                filter: blur(4px);
            }

            70% {
                opacity: 0.9;
                transform: translateX(-10px) scale(1.01);
                filter: blur(0);
            }

            85% {
                transform: translateX(4px) scale(1);
            }

            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes slideInFromTop {
            0% {
                opacity: 0;
                transform: translateY(-100px) scale(0.92);
                filter: blur(8px);
            }

            60% {
                opacity: 0.8;
                transform: translateY(6px) scale(1.01);
                filter: blur(0);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes slideInFromBottom {
            0% {
                opacity: 0;
                transform: translateY(100px) scale(0.92);
                filter: blur(8px);
            }

            60% {
                opacity: 0.8;
                transform: translateY(-6px) scale(1.01);
                filter: blur(0);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        /* ─── Panel Labels ─── */
        .box-label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--accent);
            position: relative;
            z-index: 2;
        }

        /* ─── Textareas ─── */
        textarea {
            width: 100%;
            height: 180px;
            background: rgba(6, 12, 24, 0.6);
            border: 1px solid rgba(0, 255, 217, 0.08);
            border-radius: 10px;
            color: #f4f7fc;
            font-family: 'Inter', sans-serif;
            font-size: 1.02rem;
            font-weight: 400;
            line-height: 1.65;
            padding: 1rem;
            resize: none;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            z-index: 2;
        }

        textarea::placeholder {
            color: #7a8aa4;
            font-weight: 400;
        }

        textarea:focus {
            border-color: rgba(0, 255, 217, 0.25);
            box-shadow: inset 0 0 24px rgba(0, 255, 217, 0.05);
        }

        textarea[readonly] {
            background: rgba(4, 8, 18, 0.65);
            cursor: default;
        }

        /* ─── Action Buttons ─── */
        .action-bar {
            display: flex;
            gap: 0.5rem;
            position: relative;
            z-index: 2;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(0, 255, 217, 0.12);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 0.45rem;
            letter-spacing: 0.02em;
            position: relative;
            overflow: hidden;
        }

        .action-btn:hover {
            background: rgba(0, 255, 217, 0.08);
            border-color: var(--accent);
            color: #ffffff;
            box-shadow: 0 0 16px rgba(0, 255, 217, 0.12);
            transform: translateY(-1px);
        }

        .action-btn:active {
            transform: translateY(0) scale(0.97);
        }

        /* ─── Translate Button ─── */
        .translate-btn-wrap {
            opacity: 0;
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
        }

        .translate-btn {
            width: 100%;
            padding: 0.85rem 2rem;
            background: linear-gradient(135deg, rgba(0, 224, 200, 0.15) 0%, rgba(0, 180, 164, 0.1) 100%);
            border: 1px solid rgba(0, 224, 200, 0.25);
            border-radius: 12px;
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .translate-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 224, 200, 0.08), transparent);
            transition: left 0.6s ease;
        }

        .translate-btn:hover {
            background: linear-gradient(135deg, rgba(0, 224, 200, 0.22) 0%, rgba(0, 180, 164, 0.15) 100%);
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow), 0 4px 20px rgba(0, 224, 200, 0.1);
            transform: translateY(-1px);
        }

        .translate-btn:hover::before {
            left: 100%;
        }

        .translate-btn:active {
            transform: translateY(0) scale(0.99);
        }

        .translate-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* ─── Loading Spinner ─── */
        .translate-btn.loading {
            color: transparent;
        }

        .translate-btn.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 22px;
            height: 22px;
            margin: -11px 0 0 -11px;
            border: 2px solid rgba(0, 224, 200, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ─── Scrollbar ─── */
        textarea::-webkit-scrollbar {
            width: 6px;
        }

        textarea::-webkit-scrollbar-track {
            background: transparent;
        }

        textarea::-webkit-scrollbar-thumb {
            background: rgba(0, 224, 200, 0.15);
            border-radius: 3px;
        }

        textarea::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 224, 200, 0.3);
        }

        /* ─── Footer ─── */
        .footer {
            text-align: center;
            margin-top: 2rem;
            opacity: 0;
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
        }

        .footer p {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.06em;
        }

        .footer .accent-dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            margin: 0 6px;
            vertical-align: middle;
            box-shadow: 0 0 6px var(--accent-glow);
        }

        #webgl-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at center, #070a13 0%, #030509 100%);
        }
    </style>
</head>

<body>

    <!-- 3D Canvas Background -->
    <canvas id="webgl-bg"></canvas>

    <!-- Floating Particles (generated via JS) -->
    <div id="particles"></div>

    <div class="container">
        <div class="header">
            <div class="engine-status">
                <span class="status-dot"></span>
                <span class="status-text">Neural Core v3.0 Online</span>
            </div>
            <h1>Language Translator</h1>
            <p>NEURAL TRANSLATION ENGINE</p>
            <div class="header-divider"></div>
        </div>

        <div class="toolbar">
            <div class="lang-select">
                <select id="sourceLang">
                    <option value="auto">Detect Language</option>
                    <option value="en" selected>English</option>
                    <option value="hi">Hindi</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="zh-cn">Chinese</option>
                    <option value="ar">Arabic</option>
                    <option value="pt">Portuguese</option>
                    <option value="ru">Russian</option>
                </select>
            </div>

            <button class="swap-btn" id="swapLanguages" title="Swap Languages">⇄</button>

            <div class="lang-select">
                <select id="targetLang">
                    <option value="en">English</option>
                    <option value="hi" selected>Hindi</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="zh-cn">Chinese</option>
                    <option value="ar">Arabic</option>
                    <option value="pt">Portuguese</option>
                    <option value="ru">Russian</option>
                </select>
            </div>
        </div>

        <div class="workspace">
            <div class="box source-box">
                <span class="box-label">Source</span>
                <textarea id="sourceText" placeholder="Type or paste text to translate..."></textarea>
                <div class="action-bar">
                    <button class="action-btn" id="speakSource">🔊 Listen</button>
                </div>
            </div>

            <div class="box target-box">
                <span class="box-label">Translation</span>
                <textarea id="targetText" placeholder="Translation will appear here..." readonly></textarea>
                <div class="action-bar">
                    <button class="action-btn" id="copyTarget">📋 Copy</button>
                    <button class="action-btn" id="speakTarget">🔊 Listen</button>
                </div>
            </div>
        </div>

        <div class="translate-btn-wrap">
            <button class="translate-btn" id="translateBtn">Translate</button>
        </div>

        <div class="footer">
            <p>Powered by Neural Translation<span class="accent-dot"></span>Real-time Processing</p>
        </div>
    </div>

    <script>
        // ─── 3D Space Background (Three.js) ───
        let scene, camera, renderer, starGeo, stars;
        let mouseX = 0, mouseY = 0;

        function init3DSpace() {
            const canvas = document.getElementById('webgl-bg');
            if (!canvas) return;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 1;
            camera.rotation.x = Math.PI / 2;

            renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // Create star geometry
            starGeo = new THREE.BufferGeometry();
            const starCount = 1500;
            const positions = new Float32Array(starCount * 3);

            for (let i = 0; i < starCount; i++) {
                positions[i * 3] = Math.random() * 600 - 300;
                positions[i * 3 + 1] = Math.random() * 600 - 300;
                positions[i * 3 + 2] = Math.random() * 600 - 300;
            }

            starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            function createGlowTexture() {
                const canvasTex = document.createElement('canvas');
                canvasTex.width = 16;
                canvasTex.height = 16;
                const ctxTex = canvasTex.getContext('2d');
                const grad = ctxTex.createRadialGradient(8, 8, 0, 8, 8, 8);
                grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
                grad.addColorStop(0.2, 'rgba(0, 255, 217, 0.8)');
                grad.addColorStop(0.5, 'rgba(0, 180, 164, 0.3)');
                grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctxTex.fillStyle = grad;
                ctxTex.fillRect(0, 0, 16, 16);
                return new THREE.CanvasTexture(canvasTex);
            }

            const starMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 2.2,
                map: createGlowTexture(),
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            stars = new THREE.Points(starGeo, starMaterial);
            scene.add(stars);

            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX - window.innerWidth / 2) / 100;
                mouseY = (e.clientY - window.innerHeight / 2) / 100;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            const posAttr = starGeo.getAttribute('position');
            const posArray = posAttr.array;

            for (let i = 0; i < posArray.length / 3; i++) {
                posArray[i * 3 + 1] -= 0.2;

                if (posArray[i * 3 + 1] < -300) {
                    posArray[i * 3 + 1] = 300;
                    posArray[i * 3] = Math.random() * 600 - 300;
                    posArray[i * 3 + 2] = Math.random() * 600 - 300;
                }
            }

            posAttr.needsUpdate = true;

            stars.rotation.y += 0.001;
            stars.rotation.x += (mouseY * 0.05 - stars.rotation.x) * 0.05;
            stars.rotation.z += (mouseX * 0.05 - stars.rotation.z) * 0.05;

            renderer.render(scene, camera);
        }

        init3DSpace();

        // ─── Floating Particles ───
        (function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (10 + Math.random() * 12) + 's';
                p.style.animationDelay = (Math.random() * 8) + 's';
                const size = (2 + Math.random() * 3);
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                // Vary glow intensity per particle
                const glowSize = 4 + Math.random() * 8;
                p.style.boxShadow = `0 0 ${glowSize}px 2px var(--accent-glow), 0 0 ${glowSize * 2}px 4px rgba(0, 255, 217, 0.12)`;
                container.appendChild(p);
            }
        })();

        // ─── API Configuration ───
        const API_URL = 'https://codealpha-language-translation-tool-1g75.onrender.com/api/translate';

        // ─── UI Elements ───
        const sourceLang = document.getElementById('sourceLang');
        const targetLang = document.getElementById('targetLang');
        const sourceText = document.getElementById('sourceText');
        const targetText = document.getElementById('targetText');
        const translateBtn = document.getElementById('translateBtn');
        const swapLanguages = document.getElementById('swapLanguages');
        const copyTarget = document.getElementById('copyTarget');
        const speakSource = document.getElementById('speakSource');
        const speakTarget = document.getElementById('speakTarget');

        // ─── Translation Core Logic ───
        async function performTranslation() {
            const textValue = sourceText.value.trim();
            if (!textValue) return;

            translateBtn.disabled = true;
            translateBtn.classList.add('loading');
            translateBtn.innerText = 'Translating...';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: textValue,
                        source_lang: sourceLang.value,
                        target_lang: targetLang.value
                    })
                });

                if (!response.ok) throw new Error('Network payload rejection');

                const data = await response.json();
                targetText.value = data.translated_text;
            } catch (error) {
                console.error('Translation error:', error);
                targetText.value = '[Error: Unable to connect to translation backend. Ensure main.py is running.]';
            } finally {
                translateBtn.disabled = false;
                translateBtn.classList.remove('loading');
                translateBtn.innerText = 'Translate';
            }
        }

        // ─── Event Bindings ───
        translateBtn.addEventListener('click', performTranslation);

        // Keyboard shortcut: Ctrl+Enter to translate
        sourceText.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') performTranslation();
        });

        swapLanguages.addEventListener('click', () => {
            if (sourceLang.value === 'auto') return;
            const tempLang = sourceLang.value;
            sourceLang.value = targetLang.value;
            targetLang.value = tempLang;

            const tempText = sourceText.value;
            sourceText.value = targetText.value;
            targetText.value = tempText;
        });

        // ─── Copy Utility ───
        copyTarget.addEventListener('click', () => {
            if (!targetText.value) return;
            navigator.clipboard.writeText(targetText.value);
            const originalText = copyTarget.innerText;
            copyTarget.innerText = '✅ Copied!';
            setTimeout(() => copyTarget.innerText = originalText, 2000);
        });

        // ─── Text to Speech Engine (Web Speech API) ───
        function speak(text, langCode) {
            if (!text) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = langCode === 'auto' ? 'en' : langCode;
            window.speechSynthesis.speak(utterance);
        }

        speakSource.addEventListener('click', () => speak(sourceText.value, sourceLang.value));
        speakTarget.addEventListener('click', () => speak(targetText.value, targetLang.value));
    </script>

</body>
